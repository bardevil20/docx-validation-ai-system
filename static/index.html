<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Rule Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">
  <div class="max-w-3xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Document Rule Checker</h1>

    <div class="bg-white rounded-lg shadow-md p-6 mb-8">
      <form id="analyzerForm">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Upload Document (.docx)</label>
          <input type="file" id="fileInput" accept=".docx" required
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Rules</label>
          <textarea id="rulesInput" rows="6" placeholder="Enter rules, one per line..." required
            class="w-full px-3 py-2 border border-gray-300 rounded-md resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition-colors duration-200 flex items-center justify-center gap-2">
          <span id="btnText">Run Analysis</span>
          <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>
    </div>

    <div id="results" class="hidden">
      <h2 class="text-xl font-semibold mb-4 text-gray-800">Results</h2>
      <div id="resultsContent" class="space-y-4"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('analyzerForm');
    const fileInput = document.getElementById('fileInput');
    const rulesInput = document.getElementById('rulesInput');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const results = document.getElementById('results');
    const resultsContent = document.getElementById('resultsContent');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      btnText.textContent = 'Analyzing...';
      btnSpinner.classList.remove('hidden');
      results.classList.add('hidden');

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('rules', rulesInput.value);

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) throw new Error('Request failed');

        const violations = await res.json();

        results.classList.remove('hidden');
        resultsContent.innerHTML = '';

        if (!violations.length) {
          resultsContent.innerHTML = '<p class="text-gray-600">No violations found.</p>';
          return;
        }

        violations.forEach((v) => {
          const card = document.createElement('div');
          card.className = 'bg-white rounded-lg shadow-md p-5 border-l-4 border-red-500';
          card.innerHTML = `
            <h3 class="font-semibold text-gray-800 mb-1">${escapeHtml(v.rule_broken)}</h3>
            <p class="text-sm text-gray-600 mb-2 italic">"${escapeHtml(v.quote_from_text)}"</p>
            <p class="text-gray-700">${escapeHtml(v.explanation)}</p>
          `;
          resultsContent.appendChild(card);
        });
      } catch (err) {
        results.classList.remove('hidden');
        resultsContent.innerHTML = `<p class="text-red-600">Error: ${escapeHtml(err.message)}</p>`;
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = 'Run Analysis';
        btnSpinner.classList.add('hidden');
      }
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
